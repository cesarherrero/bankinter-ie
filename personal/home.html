<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Home | Bankinter</title>
    <style>
      html,
      body {
        margin: 0;
        background: #fff;
      }

      .bankinter-home * {
        box-sizing: border-box;
      }

      body.bankinter-home {
        display: block;
      }

      .page-shot {
        display: block;
        width: 100%;
        height: auto;
      }

      @media (width <= 899px) {
        .page-shot {
          width: 100%;
        }
      }
    </style>
  </head>
  <body class="appear bankinter-home">
    <picture>
      <source media="(max-width: 899px)" srcset="/personal/home-mobile.png">
      <img class="page-shot" src="/personal/home-desktop.png" alt="Bankinter home page screenshot">
    </picture>
  </body>
</html>
